version: 2

models:
  - name: stg_users
    description: One row per registered user.
    columns:
      - name: user_id
        description: Primary key — unique identifier for the user.
        tests:
          - not_null
          - unique
      - name: first_name
        description: User's first name.
        tests:
          - not_null
      - name: last_name
        description: User's last name.
        tests:
          - not_null
      - name: email
        description: User's email address.
        tests:
          - not_null
          - unique
      - name: created_at
        description: Timestamp when the user registered.
        tests:
          - not_null
      - name: location_id
        description: Foreign key to stg_locations.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_locations')
                field: location_id

  - name: stg_locations
    description: One row per user location. All records are US-based.
    columns:
      - name: location_id
        description: Primary key.
        tests:
          - not_null
          - unique
      - name: country_code
        description: ISO 2-letter country code.
        tests:
          - not_null
          - accepted_values:
              values: ['US']
      - name: country_full_name
        description: Full country name.
        tests:
          - not_null
      - name: city
        description: City name.
        tests:
          - not_null
      - name: state
        description: US state name.
        tests:
          - not_null
      - name: zip_code
        description: Postal code as a string.
        tests:
          - not_null
      - name: address
        description: Street address.
        tests:
          - not_null

  - name: stg_orders
    description: One row per order placed by a user.
    columns:
      - name: order_id
        description: Primary key.
        tests:
          - not_null
          - unique
      - name: user_id
        description: Foreign key to stg_users.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_users')
                field: user_id
      - name: order_date
        description: Timestamp when the order was placed.
        tests:
          - not_null
      - name: order_status
        description: Current fulfilment status of the order.
        tests:
          - not_null
          - accepted_values:
              values: ['pending', 'shipped', 'delivered', 'cancelled']
      - name: payment_method
        description: Payment method used at checkout.
        tests:
          - not_null
          - accepted_values:
              values: ['credit card', 'paypal', 'bank transfer']
      - name: updated_at
        description: Timestamp of the last status update.
        tests:
          - not_null

  - name: stg_order_items
    description: One row per line item within an order.
    columns:
      - name: order_item_id
        description: Primary key.
        tests:
          - not_null
          - unique
      - name: order_id
        description: Foreign key to stg_orders.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: product_id
        description: Foreign key to stg_products.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id
      - name: quantity
        description: Number of units ordered.
        tests:
          - not_null
      - name: unit_price
        description: Price per unit at the time of the order.
        tests:
          - not_null
      - name: discount
        description: Fractional discount applied (e.g. 0.10 = 10%). Zero means no discount.
        tests:
          - not_null
      - name: line_total
        description: Final line amount after discount — unit_price * quantity * (1 - discount).
        tests:
          - not_null

  - name: stg_products
    description: One row per product in the catalogue.
    columns:
      - name: product_id
        description: Primary key.
        tests:
          - not_null
          - unique
      - name: product_name
        description: Display name of the product.
        tests:
          - not_null
      - name: category
        description: Product category (e.g. Sofa, Table, Chair).
        tests:
          - not_null
      - name: description
        description: Long-form product description.
      - name: price
        description: Current list price in USD.
        tests:
          - not_null
      - name: dimensions
        description: Physical dimensions (e.g. 120x60x75 cm).
      - name: material
        description: Primary material of the product.
      - name: stock
        description: Current units available in stock.
        tests:
          - not_null

  - name: stg_user_events
    description: One row per user interaction event captured during browsing and checkout.
    columns:
      - name: event_id
        description: Primary key.
        tests:
          - not_null
          - unique
      - name: user_id
        description: Foreign key to stg_users.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_users')
                field: user_id
      - name: event_type
        description: Type of interaction recorded.
        tests:
          - not_null
          - accepted_values:
              values: ['user_sign_up', 'page_view', 'add_to_cart']
      - name: event_timestamp
        description: Timestamp when the event was fired.
        tests:
          - not_null
      - name: page_url
        description: URL of the page where the event fired.
        tests:
          - not_null
      - name: product_id
        description: Product in context at event time; null for non-product pages (e.g. /catalog, /checkout, /signup).
        tests:
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id
      - name: additional_details
        description: Optional JSON payload for supplementary event data. Currently unpopulated.
