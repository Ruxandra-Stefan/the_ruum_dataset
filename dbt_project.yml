name: the_ruum
version: '1.0.0'
config-version: 2
profile: the_ruum

model-paths: ["models"]
seed-paths: ["output", "seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  the_ruum:
    staging:
      +materialized: view
    staging_incremental:
      +materialized: incremental
      +on_schema_change: fail
    mart:
      +materialized: table
